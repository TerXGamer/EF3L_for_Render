services:
  - type: web
    name: ifal-for-render
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ifal-render-db
          property: connectionString
      - key: ADMIN_SET
        sync: false

databases:
  - name: ifal-render-db
    databaseName: ifal
    user: ifal
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
